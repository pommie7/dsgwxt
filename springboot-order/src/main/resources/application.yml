server:
  port: 8080

spring:
  profiles:
    active: dev

  # ---- H2 内存数据库（开发/测试环境）----
  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # ---- SQL 初始化 ----
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# ---- MyBatis Plus 配置 ----
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# ---- 日志 ----
logging:
  level:
    com.ecommerce.order: debug
